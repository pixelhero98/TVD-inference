
# Conda environment for Diffusion-Flow-Inference.
# Create with: conda env create -f environment.conda.yml

name: diffusion-flow-inference
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy=2.4.2
  - scipy>=1.11
  - matplotlib>=3.8,<4
  - pytorch=2.10.*
  - pip:
      - wfdb>=4.1
      - pyedflib>=0.1.38
